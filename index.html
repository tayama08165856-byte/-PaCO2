<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>分時換気量計算アプリ | Ventilation Calc</title>
    <meta name="description" content="分時換気量、予想体重、目標PaCO2調整を簡単に計算できる医療従事者向けアプリ">
    <link rel="stylesheet" href="style.css?v=1.2">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>分時換気量計算</h1>
            <p class="subtitle">Ventilation Calculation Tool</p>
        </header>

        <nav class="tabs">
            <button class="tab-btn active" onclick="switchTab('basic')">基本 / IBW</button>
            <button class="tab-btn" onclick="switchTab('paco2')">PaCO2 調整</button>
            <button class="tab-btn" onclick="switchTab('table')">換気量表</button>
        </nav>

        <!-- Section 1: Basic & IBW -->
        <main id="basic-section" class="tab-content">
            <div class="card">
                <div class="card-title">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><polyline points="16 11 18 13 22 9"></polyline></svg>
                    患者情報・設定
                </div>
                <div class="grid">
                    <div class="input-group">
                        <label for="height">身長 (cm)</label>
                        <input type="number" id="height" placeholder="170" value="170" inputmode="decimal">
                    </div>
                    <div class="input-group">
                        <label for="gender">性別</label>
                        <select id="gender">
                            <option value="male">男性 (Male)</option>
                            <option value="female">女性 (Female)</option>
                        </select>
                    </div>
                    <div class="input-group full-width">
                        <label for="tv">1回換気量 (ml)</label>
                        <div id="tv" class="readonly-display">-</div>
                    </div>
                    <div class="input-group">
                        <label for="rr">呼吸数 (回/分)</label>
                        <input type="number" id="rr" placeholder="12" value="12" inputmode="decimal">
                    </div>
                    <div class="input-group">
                        <label for="mlkg">設定目安 (ml/kg)</label>
                        <input type="number" id="mlkg" placeholder="7" value="7" step="0.1" inputmode="decimal">
                    </div>
                </div>

                <div class="results">
                    <div class="result-item">
                        <span class="result-label">予想体重 (IBW)</span>
                        <span class="result-value" id="ibw-res">-<span class="result-unit">kg</span></span>
                    </div>
                    <div class="result-item highlight-result">
                        <span class="result-label">分時換気量 (MV)</span>
                        <span class="result-value large" id="mv-res">-<span class="result-unit">L/min</span></span>
                    </div>
                </div>
            </div>
        </main>

        <!-- Section 2: PaCO2 Adjustment -->
        <section id="paco2-section" class="tab-content hidden">
            <div class="card">
                <div class="card-title">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"></path></svg>
                    PaCO2 換気量調整
                </div>
                <div class="grid">
                    <div class="input-group full-width">
                        <label for="current-mv">現在の分時換気量 (L/min)</label>
                        <input type="number" id="current-mv" placeholder="6.0" step="0.1" inputmode="decimal">
                    </div>
                    <div class="input-group">
                        <label for="current-paco2">現在の PaCO2 (mmHg)</label>
                        <input type="number" id="current-paco2" placeholder="50" step="0.1" inputmode="decimal">
                    </div>
                    <div class="input-group">
                        <label for="target-paco2">目標 PaCO2 (mmHg)</label>
                        <input type="number" id="target-paco2" placeholder="40" step="0.1" value="40" inputmode="decimal">
                    </div>
                </div>

                <div class="results">
                    <div class="result-item highlight-result">
                        <span class="result-label">必要分時換気量</span>
                        <span class="result-value large" id="target-mv-res">-<span class="result-unit">L/min</span></span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">現在の設定比</span>
                        <span class="result-value" id="ratio-res">-<span class="result-unit">%</span></span>
                    </div>
                </div>
            </div>
        </section>

        <!-- Section 3: Table -->
        <section id="table-section" class="tab-content hidden">
            <div class="card">
                <div class="card-title">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3h18v18H3z"></path><path d="M3 9h18"></path><path d="M3 15h18"></path><path d="M9 3v18"></path><path d="M15 3v18"></path></svg>
                    換気量一覧表
                </div>
                <p class="table-info">
                    1回換気量 <input type="number" id="tv-table" class="inline-input" inputmode="decimal"> ml の時のMV
                </p>
                <div class="table-container">
                    <table id="mv-table">
                        <thead>
                            <tr>
                                <th>呼吸数</th>
                                <th>MV (L/min)</th>
                                <th>効率(目安)</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Generated by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </section>

        <footer class="footer">
            <p>&copy; 2026 Ventilation Calculation Tool<br>医療判断の補助としてのみご使用ください</p>
        </footer>
    </div>

    <script src="script.js?v=1.2"></script></script>
</body>
</html>
